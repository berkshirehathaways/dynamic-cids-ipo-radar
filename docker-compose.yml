version: "3.9"

services:
  backend:
    image: node:22
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev -w backend"
    ports:
      - "8787:8787"

  frontend:
    image: node:22
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run dev -w frontend -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - backend
